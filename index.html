<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veloura - Sexy Women's Fashion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #111;
            color: #fff;
        }

        header {
            background: linear-gradient(135deg, #000, #330033);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-weight: 600;
            letter-spacing: 2px;
            color: #ff4da6;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 25px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4da6;
        }

        .hero {
            height: 90vh;
            background: url('https://images.unsplash.com/photo-1520975922215-230b9b8e6a6f?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-blend-mode: overlay;
            background-color: rgba(0,0,0,0.6);
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            background: #ff4da6;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e60073;
        }

        .products {
            padding: 60px 50px;
            text-align: center;
        }

        .products h3 {
            font-size: 2rem;
            margin-bottom: 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card h4 {
            margin-bottom: 10px;
        }

        .price {
            color: #ff4da6;
            font-weight: 600;
            margin-bottom: 15px;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .hero h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>VELOURA</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">New Arrivals</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Unleash Your Confidence</h2>
        <p>Bold. Elegant. Irresistible.</p>
        <a href="#" class="btn">Shop Now</a>
    </div>
</section>

<section class="products">
    <h3>Featured Collection</h3>
    <div class="product-grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f?auto=format&fit=crop&w=800&q=80" alt="Red Dress">
            <div class="card-content">
                <h4>Scarlet Bodycon Dress</h4>
                <div class="price">$89.99</div>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=800&q=80" alt="Black Outfit">
            <div class="card-content">
                <h4>Midnight Lace Set</h4>
                <div class="price">$69.99</div>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1520975682048-0c24c92a3a8e?auto=format&fit=crop&w=800&q=80" alt="Heels">
            <div class="card-content">
                <h4>Stiletto Heels</h4>
                <div class="price">$59.99</div>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

    </div>
</section>

<footer>
    © 2026 Veloura Fashion. All Rights Reserved.
</footer>

</body>
</html>
